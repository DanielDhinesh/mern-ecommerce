events {}

http {

    include mime.types;

    set_real_ip_from 0.0.0.0/0;
    real_ip_recursive on;
    real_ip_header X-Forwarded-For;

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name danialdhinesh.online www.danialdhinesh.online;

        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name danialdhinesh.online www.danialdhinesh.online;

        ssl_certificate     /etc/letsencrypt/live/danialdhinesh.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/danialdhinesh.online/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;

        limit_req zone=mylimit burst=70 nodelay;

        # Send API requests to the Node.js server instead of the SPA fallback.
        location /api/ {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
